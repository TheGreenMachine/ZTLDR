shooterSettings:
    distancesInches:
        - 48
        - 96
        - 156
        - 204
        - 264
        - 360 # Maximum distance shot
    inclineAnglesRotations:
        - 0.0405 # 48
        - 0.0555 # 96
        - 0.08 # 156
        - 0.09 # 204
        - 0.1196 # 264
        - 0.108 # 360
    launchVelocitiesRPS:
        - 35 # 48
        - 47 # 96
        - 46 # 156
        - 48 # 204
        - 54 # 264
        - 100 # 360

subsystems:
    turret:
        devices:
            turret:
                id: 5
                deviceType: TalonFXS
                motorType: Brushed_DC
                motorRotation: Clockwise_Positive
    drivetrain:
        canBusName: "super"
        devices:
            range:
                deviceType: CANrange
                id: 7
            leftMain:
                deviceType: TalonFX
                id: 1
                neutralMode: Brake
            imu:
                deviceType: Pigeon2
                id: 6
        pidConfig:
            slot0:
                kP: 0.1 # 0.18
                kI: 0.0001 # 0.018
                kD: 4.0 # 3.6
                kV: 0.0475813
    ledManager:
        devices:
            argb:
                id: 3
                deviceType: CANifier
            drgb:
                id: 4
                deviceType: CANdle

    feeder:
        implemented: true
        devices:
            feedMotor:
                deviceType: TalonFX
                id: 22
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
            agitateMotor:
                deviceType: TalonFX
                id: 24
                supplyCurrentLimit: 10
                statorCurrentLimit: 25
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
        constants:
            feedingDutyCycle: 0.7
            stoppedDutyCycle: 0
            agitateForwardDutyCycle: -0.15
            agitateStoppedDutyCycle: -0.15
    intake:
        implemented: true
        devices:
            intakeMotor:
                id: 2
                deviceType: TalonFX
                neutralMode: Coast
                motorRotation: Clockwise_Positive
            flipperMotor:
                id: 3
                deviceType: TalonFX
                supplyCurrentLimit: 35
                statorCurrentLimit: 60
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 10
                remoteOffest: 0
                rotorToSensor: 0.1
                pidConfig:
                    slot0:
                        kS: 0.1 # static friction - increase if turret won't move at small errors
                        kP: 50 # position error gain - increase if still lagging, decrease if oscillating at setpoint
                        kD: 0.28 # position error gain - increase if not reaching target, decrease if oscillating
                        staticFeedforwardSign: UseClosedLoopSign
                motionMagic:
                    expoKV: 10 # cruise speed - lower = faster, higher = slower
                    expoKA: 5.0 # acceleration smoothness - higher = gentler ramp, lower = snappier
            flipCoder:
                id: 10
                deviceType: CANcoder
        constants:
            intakeOnSpeed: .4
            intakeSlowSpeed: .1
            outtakeSpeed: -0.6
            flipperMotorOutPosition: 0.164 #0.166
            flipperMotorPullInOnePosition: 0.1
            flipperMotorPullInTwoPosition: 0.05
            flipperMotorInPosition: 0.025
    gatekeeper:
        canBusName: shootercanivore
        devices:
            topMotor:
                deviceType: TalonFX
                id: 23
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.081
        constants:
            topClosedVelocity: 0
            topOpenVelocity: 60
    shooter:
        implemented: true
        canBusName: shootercanivore
        devices:
            topLaunchMotor:
                deviceType: TalonFX
                id: 25
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            bottomLaunchMotor:
                deviceType: TalonFX
                id: 26
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            inclineMotor:
                deviceType: TalonFXS
                motorType: NEO550_JST
                remoteSensor: RemoteCANcoder
                remoteSensorId: 29
                id: 27
                motorRotation: Clockwise_Positive
                reverseSoftLimit: 0.062
                forwardSoftLimit: 0.1196
                statorCurrentLimit: 35
                pidConfig:
                    slot0:
                        kS: 0.01
                        kP: 700
                        kD: 0.1
                motionMagic:
                    expoKV: 1
                    expoKA: 0.3
            turretMotor:
                deviceType: TalonFX
                id: 28
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.1 # static friction - increase if turret won't move at small errors
                        kP: 4 # position error gain - increase if still lagging, decrease if oscillating at setpoint
                        kD: 0.28 # damping - increase if oscillating, keep roughly kP/20
                motionMagic:
                    expoKV: 0.02 #0.10 # cruise speed - lower = faster moves, higher = slower. Start here, decrease if turret feels sluggish
                    expoKA: 0.1 #0.2 # acceleration smoothness - increase if dead zone reversals are too violent, decrease if turret feels mushy
            inclineCoder:
                id: 29
                deviceType: CANcoder
                magneticSensor:
                    sensorDirection: Clockwise_Positive
                    absoluteSensorDiscontinuityPoint: 0.625
                    magnetOffset: -0.35748674479
            candi:
                id: 6
                deviceType: CANdi
        constants:
            leftTurretSensorChannel: 0
            rightTurretSensorChannel: 1
            motorRotationsPerTurretRotation: 15.625 # 250/16 gear ratio
            shooterOffsetXMeters: -0.111303
            shooterOffsetYMeters: -0.112268
            shooterOffsetZMeters: 0.508
            inclineDuckingLimitRotations: 0.057
            distanceOneInclineAngleRotations: 0.064
            distanceOneLaunchVelocityRPS: 35
            distanceTwoInclineAngleRotations: 0.08
            distanceTwoLaunchVelocityRPS: 47
            distanceThreeInclineAngleRotations: 0.1196
            distanceThreeLaunchVelocityRPS: 100
            distanceAutoThingLaunchVelocityRPS: 60
            closeDistanceBetweenBeamBreaks: 0.419
            farDistanceBetweenBeamBreaks: 13.570
            secondLowestBeamBreakToZero: 6.7769
            turretRotationToleranceDegrees: 5
            inclineAngleToleranceDegrees: 4
            launcherVelocityToleranceRPS: 2
            launchVelocityAdjustmentAmountRPS: 0.01
            inclineAngleAdjustmentAmountDegrees: 0.02
            turretAngleAdjustmentAmountDegrees: 0.04
            topLaunchMotorBackspinMultiplier: 1 # Less than one for backspin.
    vision:
        cameras:
            forwardLeft: # Pi IP: 10.18.16.11
                photonVisionUIName: Forward_Left
                robotToCamera:
                    xInches: -10.114
                    yInches: 3.587
                    zInches: 20
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: 0
                detectionType: APRIL_TAG
            forwardRight: # Pi IP: 10.18.16.12
                photonVisionUIName: Forward_Right
                robotToCamera:
                    xInches: -12.66
                    yInches: -12.1
                    zInches: 18
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: -55
                detectionType: APRIL_TAG
            backwardLeft: # Pi IP: 10.18.16.13
                photonVisionUIName: Backward_Left
                robotToCamera:
                    xInches: -12.66
                    yInches: 12.1
                    zInches: 16
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: 155
                detectionType: APRIL_TAG
            backwardRight: # Pi IP: 10.18.16.14
                photonVisionUIName: Backward_Right
                robotToCamera:
                    xInches: -12.66
                    yInches: -12.1
                    zInches: 16
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: -155
                detectionType: APRIL_TAG
            fuelDetector:
                photonVisionUIName: Fuel_Detector
                robotToCamera:
                    xInches: 12.5
                    yInches: 0
                    zInches: 15
                detectionType: NONE # TODO: Object detection

constants:
    foo: 3
