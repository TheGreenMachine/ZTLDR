subsystems:
    turret:
        devices:
            turret:
                id: 5
                deviceType: TalonFXS
                motorType: Brushed_DC
                motorRotation: Clockwise_Positive
    drivetrain:
        canBusName: "super"
        devices:
            range:
                deviceType: CANrange
                id: 7
            leftMain:
                deviceType: TalonFX
                id: 1
                neutralMode: Brake
            imu:
                deviceType: Pigeon2
                id: 6
        pidConfig:
            slot0:
                kP: 0.1 # 0.18
                kI: 0.0001 # 0.018
                kD: 4.0 # 3.6
                kV: 0.0475813
    ledManager:
        devices:
            argb:
                id: 3
                deviceType: CANifier
            drgb:
                id: 4
                deviceType: CANdle

    feeder:
        implemented: true
        devices:
            feedMotor:
                deviceType: TalonFX
                id: 22
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
        constants:
            feedingDutyCycle: 0.7
            stoppedDutyCycle: 0
            reversingDutyCycle: -0.4
    intake:
        implemented: true
        devices:
            intakeMotor:
                id: 2
                deviceType: TalonFX
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
            flipperMotor:
                id: 3
                deviceType: TalonFX
                supplyCurrentLimit: 35
                statorCurrentLimit: 60
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 10
                remoteOffest: 0
                rotorToSensor: 0.1
            flipCoder:
                id: 10
                deviceType: CANcoder
        constants:
            intakeOnSpeed: .4
            intakeSlowSpeed: .1
            outtakeSpeed: -0.6
            flipperMotorOutPosition: 0.166
            flipperMotorPullInOnePosition: 0.1
            flipperMotorPullInTwoPosition: 0.05
            flipperMotorInPosition: 0.025
            flipperMotorRetractCurrentAmperes: -25
            flipperMotorExtendCurrentAmperes: 25
            flipperMotorHoldOutCurrentAmperes: 8
            flipperMotorHoldInCurrentAmperes: -8
    gatekeeper:
        canBusName: shootercanivore
        devices:
            topMotor:
                deviceType: TalonFX
                id: 23
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.081
        constants:
            topClosedVelocity: 0
            topOpenVelocity: 40
            topReversingVelocity: -10
    shooter:
        canBusName: shootercanivore
        devices:
            topLaunchMotor:
                deviceType: TalonFX
                id: 25
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            bottomLaunchMotor:
                deviceType: TalonFX
                id: 26
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            inclineMotor:
                deviceType: TalonFXS
                motorType: NEO550_JST
                remoteSensor: RemoteCANcoder
                remoteSensorId: 29
                id: 27
                motorRotation: Clockwise_Positive
                reverseSoftLimit: 0.062
                forwardSoftLimit: 0.1196
                statorCurrentLimit: 35
                pidConfig:
                    slot0:
                        kS: 0.8
                        kP: 100
                        staticFeedforwardSign: UseClosedLoopSign
                motionMagic:
                    expoKV: 1
                    expoKA: 0.3
            turretMotor:
                deviceType: TalonFX
                id: 28
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.29
                        kP: 1
                        kD: 0.05
                        staticFeedforwardSign: UseClosedLoopSign
            inclineCoder:
                id: 29
                deviceType: CANcoder
                magneticSensor:
                    sensorDirection: Clockwise_Positive
                    absoluteSensorDiscontinuityPoint: 0.625
                    magnetOffset: -0.35748674479
            candi:
                id: 6
                deviceType: CANdi
        constants:
            leftTurretSensorChannel: 0
            rightTurretSensorChannel: 1
            motorRotationsPerTurretRotation: 15.625 # 250/16 gear ratio
            shooterOffsetXMeters: -0.111303
            shooterOffsetYMeters: -0.112268
            shooterOffsetZMeters: 0.508
            inclineDuckingLimitRotations: 0.064
            distanceOneInclineAngleRotations: 0.064
            distanceOneLaunchVelocityRPS: 35
            distanceTwoInclineAngleRotations: 0.08
            distanceTwoLaunchVelocityRPS: 47
            distanceThreeInclineAngleRotations: 0.1196
            distanceThreeLaunchVelocityRPS: 100
            distanceAutoThingLaunchVelocityRPS: 60
            closeDistanceBetweenBeamBreaks: 0.419
            farDistanceBetweenBeamBreaks: 13.570
            secondLowestBeamBreakToZero: 6.7769
            turretRotationToleranceDegrees: 5
            inclineAngleToleranceDegrees: 2
            launcherVelocityToleranceRPS: 2
            launchVelocityAdjustmentAmountRPS: 0.01
            inclineAngleAdjustmentAmountDegrees: 0.02
            turretAngleAdjustmentAmountDegrees: 0.04
            topLaunchMotorBackspinMultiplier: .95 # Less than one for backspin.

constants:
    foo: 3
