                remoteSensorId: 9
                remoteOffest: 0.284668
            flCoder:
                id: 9
                deviceType: CANcoder
            frDr:
                id: 2
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
            frAz:
                id: 6
