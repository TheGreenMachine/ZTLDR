subsystems:
    drivetrain:
        implemented: true
        devices:
            flDr:
                id: 35
                deviceType: TalonFX
                neutralMode: Brake
                supplyCurrentLimit: 40
            flAz:
                id: 30
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 41
                remoteOffest: -0.300537
                statorCurrentLimit: 60
                supplyCurrentLimit: 40
            flCoder:
                id: 41
                deviceType: CANcoder
            frDr:
                id: 34
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                supplyCurrentLimit: 40
            frAz:
                id: 31
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 43
                remoteOffest: -0.439453
                statorCurrentLimit: 60
                supplyCurrentLimit: 40
            frCoder:
                id: 43
                deviceType: CANcoder
            blDr:
                id: 37
                deviceType: TalonFX
                neutralMode: Brake
                supplyCurrentLimit: 40
            blAz:
                id: 33
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 42
                remoteOffest: -0.351074   # Negative Absolute Position No Offset CanCoder
                statorCurrentLimit: 60
                supplyCurrentLimit: 40
            blCoder:
                id: 42
                deviceType: CANcoder
            brDr:
                id: 36
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                supplyCurrentLimit: 40
            brAz:
                id: 32
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 40
                remoteOffest: -0.383301
                statorCurrentLimit: 60
                supplyCurrentLimit: 40
            brCoder:
                id: 40
                deviceType: CANcoder
            gyro:
                deviceType: Pigeon2
                id: 5
        modules:
            fl:
                drive: flDr
                azimuth: flAz
            fr:
                drive: frDr
                azimuth: frAz
            bl:
                drive: blDr
                azimuth: blAz
            br:
                drive: brDr
                azimuth: brAz
        drivePID:
            slot0:
                kP: 10.0
                kI: 0
                kD: 0
                kV: 0
                kS: 0
                kA: 0.3
        azimuthPID:
            slot0:
                kP: 100
                kD: 0.5
                kV: 2.66
                kS: 0.1
        kinematics:
            driveGearing: 6.026785714285714
            steerGearing: 26.09090909090909
            couplingGearRatio: 3.857142857142857
            wheelbaseLength: .505 # meters
            wheelbaseWidth: .505 # meters
            robotMass: 74.088 # kg
            wheelRadius: .04938 # meters (1.944 in)
            maxDriveRPS: 98 # measured motor max speed rps
            maxAngularRate: 8.285 # rad/sec
            wheelCOF: 1.7
            slipCurrentAmps: 120
        constants:
            translationKp: 10
            translationKd: 0
            rotationKp: 10
            rotationKi: 0
            rotationKd: 0
            normalModeTranslationalMultiplier: 1
            normalModeRotationalMultiplier: 0.4
            slowModeTranslationalMultiplier: 0.35
            slowModeRotationalMultiplier: 0.15
    ledManager:
        implemented: false
        devices:
            argb:
                id: 14
                deviceType: CANifier
            drgb:
                id: 15
                deviceType: CANdle
        constants:
            maxLevel: 96
            ledCount: 66
    feeder:
        implemented: true
        devices:
            feedMotor:
                deviceType: TalonFX
                id: 22
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
            agitateMotor:
                deviceType: TalonFX
                id: 24
                supplyCurrentLimit: 10
                statorCurrentLimit: 25
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
        constants:
            feedingDutyCycle: 0.7
            stoppedDutyCycle: 0
            agitateForwardDutyCycle: -0.15
            agitateStoppedDutyCycle: -0.15
    intake:
        implemented: true
        devices:
            intakeMotor:
                id: 2
                deviceType: TalonFX
                neutralMode: Coast
                motorRotation: Clockwise_Positive
            flipperMotor:
                id: 3
                deviceType: TalonFX
                supplyCurrentLimit: 35
                statorCurrentLimit: 60
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 10
                remoteOffest: 0
                rotorToSensor: 0.1
                pidConfig:
                    slot0:
                        kS: 0.1 # static friction - increase if turret won't move at small errors
                        kP: 50 # position error gain - increase if still lagging, decrease if oscillating at setpoint
                        kD: 0.28 # position error gain - increase if not reaching target, decrease if oscillating
                        staticFeedforwardSign: UseClosedLoopSign
                motionMagic:
                    expoKV: 10 # cruise speed - lower = faster, higher = slower
                    expoKA: 5.0 # acceleration smoothness - higher = gentler ramp, lower = snappier
            flipCoder:
                id: 10
                deviceType: CANcoder
        constants:
            intakeOnSpeed: .35
            intakeSlowSpeed: .1
            outtakeSpeed: -0.6
            flipperMotorOutPosition: 0.184 #0.166
            flipperMotorPullInOnePosition: 0.1
            flipperMotorPullInTwoPosition: 0.05
            flipperMotorInPosition: 0.025
            flipperMotorHalfInPosition: 0.1045
    gatekeeper:
        canBusName: shootercanivore
        devices:
            topMotor:
                deviceType: TalonFX
                id: 23
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.081
        constants:
            topClosedVelocity: 0
            topOpenVelocity: 45
    shooter:
        implemented: true
        canBusName: shootercanivore
        devices:
            topLaunchMotor:
                deviceType: TalonFX
                id: 25
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            bottomLaunchMotor:
                deviceType: TalonFX
                id: 26
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            inclineMotor:
                deviceType: TalonFXS
                motorType: NEO550_JST
                remoteSensor: RemoteCANcoder
                remoteSensorId: 29
                id: 27
                motorRotation: Clockwise_Positive
                reverseSoftLimit: 0.056
                forwardSoftLimit: 0.1029
                statorCurrentLimit: 35
                pidConfig:
                    slot0:
                        kS: 0.01
                        kP: 700
                        kD: 0.1
                motionMagic:
                    expoKV: 1
                    expoKA: 0.3
            turretMotor:
                deviceType: TalonFX
                id: 28
                motorRotation: Clockwise_Positive
                sensorToMechanismRatio: 15.625 # 250/16 gear ratio
                pidConfig:
                    slot0:
                        kS: 0.1 # static friction - increase if turret won't move at small errors
                        kP: 62.5 # position error gain - increase if still lagging, decrease if oscillating at setpoint
                        kD: 4.375 # damping - increase if oscillating, keep roughly kP/20
                motionMagic:
                    expoKV: 0.3125 #0.10 # cruise speed - lower = faster moves, higher = slower. Start here, decrease if turret feels sluggish
                    expoKA: 1.5625 #0.2 # acceleration smoothness - increase if dead zone reversals are too violent, decrease if turret feels mushy
            inclineCoder:
                id: 29
                deviceType: CANcoder
                magneticSensor:
                    sensorDirection: Clockwise_Positive
                    absoluteSensorDiscontinuityPoint: 0.625
                    magnetOffset: -0.35748674479
            candi:
                id: 6
                deviceType: CANdi
        constants:
            leftTurretSensorChannel: 0
            rightTurretSensorChannel: 1
            shooterOffsetXMeters: -0.111303
            shooterOffsetYMeters: -0.112268
            shooterOffsetZMeters: 0.508
            inclineDuckingLimitRotations: 0.056
            distanceOneInclineAngleRotations: 0.064
            distanceOneLaunchVelocityRPS: 35
            distanceTwoInclineAngleRotations: 0.08
            distanceTwoLaunchVelocityRPS: 47
            distanceThreeInclineAngleRotations: 0.1113
            distanceThreeLaunchVelocityRPS: 90
            brokenInclineAutoLaunchVelocityRPS: 55 # Set to the RPS required to score at a distance from shooter to hub of 101.283 inches.
            closeDistanceBetweenBeamBreaks: 0.026816
            farDistanceBetweenBeamBreaks: 0.86848
            secondLowestBeamBreakToZero: 0.4337216
            turretRotationToleranceDegrees: 5
            inclineAngleToleranceDegrees: 4
            launcherVelocityToleranceRPS: 2
            launchVelocityAdjustmentAmountRPS: 0.01
            inclineAngleAdjustmentAmountDegrees: 0.02
            turretAngleAdjustmentAmountDegrees: 0.04
            topLaunchMotorBackspinMultiplier: 1 # Less than one for backspin.
    vision:
        cameras:
            forwardLeft: # Pi IP: 10.18.16.11
                photonVisionUIName: Forward_Left
                robotToCamera:
                    xInches: -12.66
                    yInches: 12.1
                    zInches: 16
                    rollDegrees: 0
                    pitchDegrees: -8
