subsystems:
    drivetrain:
        implemented: true
        devices:
            flDr:
                id: 35
                deviceType: TalonFX
                neutralMode: Brake
            flAz:
                id: 30
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 41
                remoteOffest: -0.300537
            flCoder:
                id: 41
                deviceType: CANcoder
            frDr:
                id: 34
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
            frAz:
                id: 31
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 43
                remoteOffest: -0.439453
            frCoder:
                id: 43
                deviceType: CANcoder
            blDr:
                id: 37
                deviceType: TalonFX
                neutralMode: Brake
            blAz:
                id: 33
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 42
                remoteOffest: -0.351074   # Negative Absolute Position No Offset CanCoder
            blCoder:
                id: 42
                deviceType: CANcoder
            brDr:
                id: 36
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
            brAz:
                id: 32
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 40
                remoteOffest: -0.383301
            brCoder:
                id: 40
                deviceType: CANcoder
            gyro:
                deviceType: Pigeon2
                id: 5
        modules:
            fl:
                drive: flDr
                azimuth: flAz
            fr:
                drive: frDr
                azimuth: frAz
            bl:
                drive: blDr
                azimuth: blAz
            br:
                drive: brDr
                azimuth: brAz
        drivePID:
            slot0:
                kP: 10.0
                kI: 0
                kD: 0
                kV: 0
                kS: 0
                kA: 0.3
        azimuthPID:
            slot0:
                kP: 100
                kD: 0.5
                kV: 2.66
                kS: 0.1
        kinematics:
            driveGearing: 6.03
            steerGearing: 26.0909
            wheelbaseLength: .505 # meters
            wheelbaseWidth: .505 # meters
            robotMass: 74.088 # kg
            wheelRadius: .04938 # meters (1.944 in)
            maxDriveRPS: 98 # measured motor max speed rps
            maxAngularRate: 8.285 # rad/sec
            wheelCOF: 1.7
        constants:
            translationKp: 20
            translationKd: 0
            rotationKp: 10
            rotationKi: 0
            rotationKd: 0
    ledManager:
        implemented: false
        devices:
            argb:
                id: 14
                deviceType: CANifier
            drgb:
                id: 15
                deviceType: CANdle
        constants:
            maxLevel: 96
            ledCount: 66
    climber:
        implemented: false
        devices:
            flipMotor:
                deviceType: TalonFX
                id: 20
                motorRotation: Clockwise_Positive
                statorCurrentLimit: 60
                motionMagic:
                    expoKV: 0.05
                    expoKA: 0.04
            linearSlideMotor:
                deviceType: TalonFX
                id: 21
                motorRotation: Clockwise_Positive
                statorCurrentLimit: 60
                motionMagic:
                    expoKV: 0.05
                    expoKA: 0.04
        constants:
            flipIdling: 0
            flipL3UpClimbing: 0
            flipL3DownClimbing: 0
            flipL1UpClimbing: 0
            flipL1DownClimbing: 0

            linearSlideIdling: 0
            linearSlideL3UpClimbing: 0
            linearSlideL3DownClimbing: 0
            linearSlideL1UpClimbing: 0
            linearSlideL1DownClimbing: 0

    feeder:
        implemented: true
        devices:
            feedMotor:
                deviceType: TalonFX
                id: 22
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
        constants:
            feedingDutyCycle: 0.7
            stoppedDutyCycle: 0
    intake:
        implemented: true
        devices:
            intakeMotor:
                id: 2
                deviceType: TalonFX
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
            flipperMotor:
                id: 3
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 10
                remoteOffest: 0
                rotorToSensor: 0.1
            flipCoder:
                id: 10
                deviceType: CANcoder
        constants: # TODO: all of these
            intakeOnSpeed: .35
            intakeOffSpeed: 0
            flipperMotorOutMinimumPosition: 0.0058
            flipperMotorRetractCurrentAmperes: -1
            flipperMotorExtendCurrentAmperes: 30
            flipperMotorHoldOutCurrentAmperes: 15
    gatekeeper:
        canBusName: shootercanivore
        devices:
            topMotor:
                deviceType: TalonFX
                id: 23
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.081
            bottomMotor:
                deviceType: TalonFX
                id: 24
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.08
        constants:
            topClosedVelocity: 0
            topOpenVelocity: 40
            bottomClosedVelocity: 0
            bottomOpenVelocity: 40
    shooter:
        canBusName: shootercanivore
        devices:
            topLaunchMotor:
                deviceType: TalonFX
                id: 25
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 3
            bottomLaunchMotor:
                deviceType: TalonFX
                id: 26
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 3
            inclineMotor:
                deviceType: TalonFXS
                motorType: NEO550_JST
                remoteSensor: RemoteCANcoder
                remoteSensorId: 29
                id: 27
                motorRotation: Clockwise_Positive
                reverseSoftLimit: 0.046
                forwardSoftLimit: 0.109
                statorCurrentLimit: 35
                pidConfig: # TODO: Tune this one.
                    slot0:
                        kS: 0.3
                        kP: 200
                        staticFeedforwardSign: UseClosedLoopSign
            turretMotor:
                deviceType: TalonFX
                id: 28
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.29
                        kP: 1
                        kD: 0.05
                        staticFeedforwardSign: UseClosedLoopSign
            inclineCoder:
                id: 29
                deviceType: CANcoder
                sensorDirection: Clockwise_Positive # TODO: Make this actually get applied to the config. See #153 in the GitHub Project.
                absoluteSensorDiscontinuityPoint: 0.625 # See above TODO.
                magnetOffset: -0.35748674479 # See above TODO.
            candi:
                id: 6
                deviceType: CANdi
        constants:
            leftTurretSensorChannel: 0
            rightTurretSensorChannel: 1
            motorRotationsPerTurretRotation: 15.625 # 250/16 gear ratio
            shooterOffsetXMeters: 0
            shooterOffsetYMeters: 0
            shooterOffsetZMeters: 0.5588
            inclineDuckingLimitDegrees: 17
            distanceOneInclineAngleDegrees: 22
            distanceOneLaunchVelocityRPS: 54
            distanceTwoInclineAngleDegrees: 22
            distanceTwoLaunchVelocityRPS: 53
            distanceThreeInclineAngleDegrees: 22
            distanceThreeLaunchVelocityRPS: 52
            closeDistanceBetweenBeamBreaks: 0.419
            farDistanceBetweenBeamBreaks: 13.570
            secondLowestBeamBreakToZero: 7.65625
            turretRotationToleranceDegrees: 2
            inclineAngleToleranceDegrees: 2
            launcherVelocityToleranceRPS: 2
    vision:
        cameras:
            forwardLeft: # Pi IP: 10.18.16.11
                photonVisionUIName: Forward_Left
                robotToCamera:
                    xInches: -12.5
                    yInches: 13
                    zInches: 16.75
                    rollDegrees: 0
                    pitchDegrees: 0
                    yawDegrees: 55
                detectionType: APRIL_TAG
            forwardRight: # Pi IP: 10.18.16.12.
                photonVisionUIName: Forward_Right
                robotToCamera:
                    xInches: -12.5
                    yInches: -13
                    zInches: 16.75
                    rollDegrees: 0
                    pitchDegrees: 0
                    yawDegrees: -55
                detectionType: APRIL_TAG
            backwardLeft: # Pi IP: 10.18.16.13
                photonVisionUIName: Backward_Left
                robotToCamera:
                    xInches: -12.5
                    yInches: 13
                    zInches: 15
                    rollDegrees: 0
                    pitchDegrees: 0
                    yawDegrees: 155
                detectionType: APRIL_TAG
            backwardRight: # Pi IP: 10.18.16.14
                photonVisionUIName: Backward_Right
                robotToCamera:
                    xInches: -12.5
                    yInches: -13
                    zInches: 15
                    rollDegrees: 0
                    pitchDegrees: 0
                    yawDegrees: -155
                detectionType: APRIL_TAG
