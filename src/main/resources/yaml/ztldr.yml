            inSpeed: -10
            inAngle: 255

            downAngle: 255
            upAngle: 45
    shooter:
        canBusName: shooterCANivore
        devices:
            topLaunchMotor:
                deviceType: TalonFX
                id: 32
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.29
                        kV: 0.115
                        kP: 0.5
            bottomLaunchMotor:
                deviceType: TalonFX
                id: 33
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.5
            launchAngleMotor:
                deviceType: TalonFXS
                motorType: NEO550_JST
                remoteSensor: RemoteCANcoder
                remoteSensorId: 36
                id: 34
                motorRotation: Clockwise_Positive
                reverseSoftLimit: 0.046
                forwardSoftLimit: 0.109
                pidConfig: # TODO: Tune this one.
                    slot0:
                        kS: 0.3
                        kP: 200
                        staticFeedforwardSign: UseClosedLoopSign
            rotationAngleMotor:
                deviceType: TalonFX
                id: 35
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.29
                        kP: 2
                        kD: 0.1
                        staticFeedforwardSign: UseClosedLoopSign
            launchAngleCoder:
                id: 36
                deviceType: CANcoder
                sensorDirection: Clockwise_Positive # TODO: Make this actually get applied to the config. See #153 in the GitHub Project.
                absoluteSensorDiscontinuityPoint: 0.625 # See above TODO.
                magnetOffset: -0.35748674479 # See above TODO.
        constants:
            rotationAngleSensorClockwiseLeft: 0
            rotationAngleSensorClockwiseRight: 1
            motorRotationsPerLaunchAngleDegree: 3.5
            motorRotationsPerRotationAngleDegree: 3.5
            initialShooterOffsetX: 0
            initialShooterOffsetY: 0
            initialShooterOffsetZ: 22
            calibrationThreshold: 10
            calibrationPositionArcAngle: 0.75
            rotationOffsetFromCalibrationZero: 70
            distanceOneLaunchAngle: 3
            distanceOneRotationAngle: 45
            distanceOneLaunchVelocity: 10
            distanceTwoLaunchAngle: 45
            distanceTwoRotationAngle: 90
            distanceTwoLaunchVelocity: 20
            distanceThreeLaunchAngle: 86
            distanceThreeRotationAngle: 0
            distanceThreeLaunchVelocity: 30
            distanceBetweenBeamBreaks: 0 # TODO: Set this
