subsystems:
    drivetrain:
        implemented: true
        devices:
            flDr:
                id: 35
                deviceType: TalonFX
                neutralMode: Brake
            flAz:
                id: 30
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 41
                remoteOffest: -0.300537
                statorCurrentLimit: 60
            flCoder:
                id: 41
                deviceType: CANcoder
            frDr:
                id: 34
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
            frAz:
                id: 31
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 43
                remoteOffest: -0.439453
                statorCurrentLimit: 60
            frCoder:
                id: 43
                deviceType: CANcoder
            blDr:
                id: 37
                deviceType: TalonFX
                neutralMode: Brake
            blAz:
                id: 33
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 42
                remoteOffest: -0.351074   # Negative Absolute Position No Offset CanCoder
                statorCurrentLimit: 60
            blCoder:
                id: 42
                deviceType: CANcoder
            brDr:
                id: 36
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
            brAz:
                id: 32
                deviceType: TalonFX
                neutralMode: Brake
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 40
                remoteOffest: -0.383301
                statorCurrentLimit: 60
            brCoder:
                id: 40
                deviceType: CANcoder
            gyro:
                deviceType: Pigeon2
                id: 5
        modules:
            fl:
                drive: flDr
                azimuth: flAz
            fr:
                drive: frDr
                azimuth: frAz
            bl:
                drive: blDr
                azimuth: blAz
            br:
                drive: brDr
                azimuth: brAz
        drivePID:
            slot0:
                kP: 10.0
                kI: 0
                kD: 0
                kV: 0
                kS: 0
                kA: 0.3
        azimuthPID:
            slot0:
                kP: 100
                kD: 0.5
                kV: 2.66
                kS: 0.1
        kinematics:
            driveGearing: 6.03
            steerGearing: 26.0909
            wheelbaseLength: .505 # meters
            wheelbaseWidth: .505 # meters
            robotMass: 74.088 # kg
            wheelRadius: .04938 # meters (1.944 in)
            maxDriveRPS: 98 # measured motor max speed rps
            maxAngularRate: 8.285 # rad/sec
            wheelCOF: 1.7
        constants:
            translationKp: 20
            translationKd: 0
            rotationKp: 10
            rotationKi: 0
            rotationKd: 0
            normalModeTranslationalMultiplier: 1
            normalModeRotationalMultiplier: 1
            slowModeTranslationalMultiplier: 0.35
            slowModeRotationalMultiplier: 0.45
    ledManager:
        implemented: false
        devices:
            argb:
                id: 14
                deviceType: CANifier
            drgb:
                id: 15
                deviceType: CANdle
        constants:
            maxLevel: 96
            ledCount: 66
    feeder:
        implemented: true
        devices:
            feedMotor:
                deviceType: TalonFX
                id: 22
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
        constants:
            feedingDutyCycle: 0.7
            stoppedDutyCycle: 0
            reversingDutyCycle: -0.4
    intake:
        implemented: true
        devices:
            intakeMotor:
                id: 2
                deviceType: TalonFX
                neutralMode: Coast
                motorRotation: CounterClockwise_Positive
            flipperMotor:
                id: 3
                deviceType: TalonFX
                neutralMode: Brake
                motorRotation: Clockwise_Positive
                remoteSensor: RemoteCANcoder # ExternalFeedbackSensorSourceValue
                remoteSensorId: 10
                remoteOffest: 0
                rotorToSensor: 0.1
            flipCoder:
                id: 10
                deviceType: CANcoder
        constants: # TODO: all of these
            intakeOnSpeed: .4
            intakeOffSpeed: 0
            flipperMotorOutPosition: 0.166
            flipperMotorPullInOnePosition: 0.1
            flipperMotorPullInTwoPosition: 0.05
            flipperMotorInPosition: 0.025
            flipperMotorRetractCurrentAmperes: -25
            flipperMotorExtendCurrentAmperes: 25
            flipperMotorHoldOutCurrentAmperes: 8
            flipperMotorHoldInCurrentAmperes: -8
    gatekeeper:
        canBusName: shootercanivore
        devices:
            topMotor:
                deviceType: TalonFX
                id: 23
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.081
            bottomMotor:
                deviceType: TalonFX
                id: 24
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kP: 0.5
                        kS: 0.31
                        kV: 0.08
        constants:
            topClosedVelocity: 0
            topOpenVelocity: 40
            topReversingVelocity: -10
            bottomClosedVelocity: 0
            bottomOpenVelocity: 40
            bottomReversingVelocity: -10
    shooter:
        canBusName: shootercanivore
        devices:
            topLaunchMotor:
                deviceType: TalonFX
                id: 25
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            bottomLaunchMotor:
                deviceType: TalonFX
                id: 26
                motorRotation: CounterClockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.28
                        kV: 0.115
                        kP: 0.3
            inclineMotor:
                deviceType: TalonFXS
                motorType: NEO550_JST
                remoteSensor: RemoteCANcoder
                remoteSensorId: 29
                id: 27
                motorRotation: Clockwise_Positive
                reverseSoftLimit: 0.0405
                forwardSoftLimit: 0.109
                statorCurrentLimit: 35
                pidConfig: # TODO: Tune this one.
                    slot0:
                        kS: 0.3
                        kP: 200
                        staticFeedforwardSign: UseClosedLoopSign
            turretMotor:
                deviceType: TalonFX
                id: 28
                motorRotation: Clockwise_Positive
                pidConfig:
                    slot0:
                        kS: 0.29
                        kP: 0.5
                        kD: 0.05
                        staticFeedforwardSign: UseClosedLoopSign
            inclineCoder:
                id: 29
                deviceType: CANcoder
                sensorDirection: Clockwise_Positive # TODO: Make this actually get applied to the config. See #153 in the GitHub Project.
                absoluteSensorDiscontinuityPoint: 0.625 # See above TODO.
                magnetOffset: -0.35748674479 # See above TODO.
            candi:
                id: 6
                deviceType: CANdi
        constants:
            leftTurretSensorChannel: 0
            rightTurretSensorChannel: 1
            motorRotationsPerTurretRotation: 15.625 # 250/16 gear ratio
            shooterOffsetXMeters: -0.11303
            shooterOffsetYMeters: -0.112268
            shooterOffsetZMeters: 0.508
            inclineDuckingLimitRotations: 0.052
            distanceOneInclineAngleRotations: 0.0611 # TODO
            distanceOneLaunchVelocityRPS: 54 # TODO
            distanceTwoInclineAngleRotations: 0.0611 # TODO
            distanceTwoLaunchVelocityRPS: 53 # TODO
            distanceThreeInclineAngleRotations: 0.0611 # TODO
            distanceThreeLaunchVelocityRPS: 52 # TODO
            closeDistanceBetweenBeamBreaks: 0.419
            farDistanceBetweenBeamBreaks: 13.570
            secondLowestBeamBreakToZero: 7.65625
            turretRotationToleranceDegrees: 3
            inclineAngleToleranceDegrees: 2
            launcherVelocityToleranceRPS: 2
            launchVelocityAdjustmentAmountRPS: 0.04
            inclineAngleAdjustmentAmountDegrees: 0.02
            turretAngleAdjustmentAmountDegrees: 0.04
    vision:
        cameras:
            forwardLeft: # Pi IP: 10.18.16.11
                photonVisionUIName: Forward_Left
                robotToCamera:
