                    pitchDegrees: -8
                    yawDegrees: 0
                detectionType: APRIL_TAG
            forwardRight: # Pi IP: 10.18.16.12
                photonVisionUIName: Forward_Right
                robotToCamera:
                    xInches: -12.66
                    yInches: -12.1
                    zInches: 18
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: -55
                detectionType: APRIL_TAG
            backwardLeft: # Pi IP: 10.18.16.13
                photonVisionUIName: Backward_Left
                robotToCamera:
                    xInches: -12.66
                    yInches: 12.1
                    zInches: 16
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: 155
                detectionType: APRIL_TAG
            backwardRight: # Pi IP: 10.18.16.14
                photonVisionUIName: Backward_Right
                robotToCamera:
                    xInches: -12.66
                    yInches: -12.1
                    zInches: 16
                    rollDegrees: 0
                    pitchDegrees: -8
                    yawDegrees: -155
                detectionType: APRIL_TAG

